name: Build Windows EXE

# Se déclenche automatiquement à chaque envoi sur la branche
# principale, et peut aussi être lancé manuellement depuis l'onglet
# "Actions" du dépôt GitHub (bouton "Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Machine Windows fournie par GitHub — c'est elle qui compile
    # réellement le .exe, pas votre machine.
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller==5.13.2"

      - name: Vérifier la présence des dossiers requis
        # PyInstaller échoue si un dossier listé dans "datas" (voir
        # le .spec) n'existe pas. On les crée s'ils manquent, pour
        # que le build ne casse jamais pour cette seule raison.
        #
        # "shell: python" fait exécuter ce bloc directement par
        # l'interpréteur Python (GitHub Actions le prend en charge
        # nativement), plutôt que de l'imbriquer dans une chaîne
        # PowerShell : évite tout risque de mauvaise interprétation
        # des caractères accentués selon l'encodage de la console
        # Windows (souvent pas UTF-8 par défaut), qui pouvait créer
        # des dossiers en double au nom légèrement corrompu
        # ("matériel utilisé" vs une variante mal encodée),
        # invisibles pour le code Python qui cherche le nom exact.
        shell: python
        run: |
          import os
          for d in [
              "profils",
              os.path.join("dossiers pour rapport", "bibliographie"),
              os.path.join("dossiers pour rapport", "materiel utilisé"),
              os.path.join("dossiers pour rapport", "Statuts des espèces"),
              os.path.join("dossiers pour rapport", "Analyse des enregistrements"),
              os.path.join("dossiers pour rapport", "images"),
          ]:
              os.makedirs(d, exist_ok=True)

      - name: Diagnostic — lister les fichiers réellement présents
        # Étape purement informative (n'échoue jamais le build) :
        # affiche dans les logs l'arborescence exacte d'assets/ et
        # "dossiers pour rapport/" telle que GitHub l'a reçue, pour
        # repérer immédiatement un dossier manquant, vide, ou un nom
        # de fichier corrompu (accents mal encodés, etc.).
        shell: python
        run: |
          import os
          for base in ["assets", "dossiers pour rapport", "profils"]:
              print(f"--- {base} ---")
              if not os.path.isdir(base):
                  print("  (DOSSIER ABSENT)")
                  continue
              for root, dirs, files in os.walk(base):
                  niveau = root.replace(base, "").count(os.sep)
                  indent = "  " * niveau
                  print(f"{indent}{os.path.basename(root) or base}/")
                  for f in files:
                      print(f"{indent}  {f}")

      - name: Compiler avec PyInstaller
        run: pyinstaller "Albat Fusion.spec"

      - name: Compresser le résultat en un seul .zip
        # Un .zip compressé (bien plus efficace que la compression
        # par défaut d'upload-artifact sur des milliers de petits
        # fichiers Qt) pour rester sous le quota de stockage gratuit
        # GitHub, souvent trop juste pour une appli PySide6.
        run: |
          Compress-Archive -Path "dist/Albat Fusion/*" -DestinationPath "Albat-Fusion-Windows.zip"
        shell: pwsh

      - name: Publier le résultat
        uses: actions/upload-artifact@v4
        with:
          name: Albat-Fusion-Windows
          path: Albat-Fusion-Windows.zip
          if-no-files-found: error
          # Conservation courte (5 jours au lieu de 90 par défaut) :
          # le quota gratuit se libère automatiquement bien plus
          # vite entre deux tentatives de compilation.
          retention-days: 5
