name: Build Windows EXE

# Se déclenche automatiquement à chaque envoi sur la branche
# principale, et peut aussi être lancé manuellement depuis l'onglet
# "Actions" du dépôt GitHub (bouton "Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Machine Windows fournie par GitHub — c'est elle qui compile
    # réellement le .exe, pas votre machine.
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Vérifier la présence des dossiers requis
        shell: python
        run: |
          import os
          for d in [
              "profils",
              os.path.join("dossiers pour rapport", "bibliographie"),
              os.path.join("dossiers pour rapport", "materiel utilisé"),
              os.path.join("dossiers pour rapport", "Statuts des espèces"),
              os.path.join("dossiers pour rapport", "Analyse des enregistrements"),
              os.path.join("dossiers pour rapport", "images"),
          ]:
              os.makedirs(d, exist_ok=True)

      - name: Diagnostic — les dossiers attendus sont-ils trouvés ?
        # Teste directement si chaque dossier que le code cherche
        # réellement est trouvé — sans jamais afficher de caractère
        # accentué en clair (pour éviter les faux problèmes liés à
        # l'encodage de la console Windows), mais avec repr() à la
        # fin pour lever toute ambiguïté sur les noms réels.
        shell: python
        run: |
          import os

          racine = os.getcwd()

          def chemin(*parts):
              return os.path.join(racine, *parts)

          a_verifier = {
              "assets": chemin("assets"),
              "profils": chemin("profils"),
              "dossiers pour rapport / bibliographie": chemin(
                  "dossiers pour rapport", "bibliographie"
              ),
              "dossiers pour rapport / materiel utilise (avec accent e)": chemin(
                  "dossiers pour rapport", "materiel utilis\u00e9"
              ),
              "dossiers pour rapport / Statuts des especes (avec accent e)": chemin(
                  "dossiers pour rapport", "Statuts des esp\u00e8ces"
              ),
              "dossiers pour rapport / Analyse des enregistrements": chemin(
                  "dossiers pour rapport", "Analyse des enregistrements"
              ),
              "dossiers pour rapport / images": chemin(
                  "dossiers pour rapport", "images"
              ),
          }

          print("Dossier de travail actuel :", racine)
          print()

          for nom, chem in a_verifier.items():
              statut = "OK" if os.path.isdir(chem) else "INTROUVABLE"
              nb = len(os.listdir(chem)) if os.path.isdir(chem) else 0
              print(f"[{statut}] {nom}  ({nb} element(s))")

          print()
          print("--- Contenu reel de dossiers pour rapport/ (repr, sans ambiguite) ---")
          base = chemin("dossiers pour rapport")
          if os.path.isdir(base):
              for nom in sorted(os.listdir(base)):
                  print(" ", repr(nom))
          else:
              print("  (dossier absent)")

          print()
          print("--- Contenu reel de assets/ (repr, sans ambiguite) ---")
          base2 = chemin("assets")
          if os.path.isdir(base2):
              for nom in sorted(os.listdir(base2)):
                  print(" ", repr(nom))
          else:
              print("  (dossier absent)")

      - name: Compiler avec PyInstaller
        run: pyinstaller "Albat Fusion.spec"

      - name: Compresser le résultat en un seul .zip
        run: |
          Compress-Archive -Path "dist/Albat Fusion/*" -DestinationPath "Albat-Fusion-Windows.zip"
        shell: pwsh

      - name: Publier le résultat
        uses: actions/upload-artifact@v4
        with:
          name: Albat-Fusion-Windows
          path: Albat-Fusion-Windows.zip
          if-no-files-found: error
          retention-days: 5
