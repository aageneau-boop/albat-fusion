name: Build Windows EXE

# Se déclenche automatiquement à chaque envoi sur la branche
# principale, et peut aussi être lancé manuellement depuis l'onglet
# "Actions" du dépôt GitHub (bouton "Run workflow").
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Machine Windows fournie par GitHub — c'est elle qui compile
    # réellement le .exe, pas votre machine.
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Vérifier la présence des dossiers requis
        run: |
          New-Item -ItemType Directory -Force -Path "profils" | Out-Null
          New-Item -ItemType Directory -Force -Path "dossiers pour rapport\bibliographie" | Out-Null
          New-Item -ItemType Directory -Force -Path "dossiers pour rapport\materiel utilisé" | Out-Null
          New-Item -ItemType Directory -Force -Path "dossiers pour rapport\Statuts des espèces" | Out-Null
          New-Item -ItemType Directory -Force -Path "dossiers pour rapport\Analyse des enregistrements" | Out-Null
          New-Item -ItemType Directory -Force -Path "dossiers pour rapport\images" | Out-Null
        shell: pwsh

      - name: Compiler avec PyInstaller
        run: pyinstaller "Albat Fusion.spec"

      - name: Publier le résultat
        uses: actions/upload-artifact@v4
        with:
          name: Albat-Fusion-Windows
          path: dist/Albat Fusion/
          if-no-files-found: error
